<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDFX - 卡密授权管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2236;
    --bg-card-hover: #1e2a42;
    --border: #2a3550;
    --text-primary: #e8ecf4;
    --text-secondary: #8892a8;
    --text-muted: #5a6478;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.25);
    --success: #22c55e;
    --success-bg: rgba(34, 197, 94, 0.12);
    --danger: #ef4444;
    --danger-bg: rgba(239, 68, 68, 0.12);
    --warning: #f59e0b;
    --warning-bg: rgba(245, 158, 11, 0.12);
    --info: #3b82f6;
    --info-bg: rgba(59, 130, 246, 0.12);
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── 背景装饰 ─── */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(59,130,246,0.06) 0%, transparent 40%);
    z-index: 0;
    animation: bgFloat 20s ease-in-out infinite alternate;
  }
  @keyframes bgFloat {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-3%, 3%); }
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  /* ─── 顶栏 ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(26,34,54,0.95) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    backdrop-filter: blur(12px);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #6366f1, #4f46e5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .stats {
    display: flex;
    gap: 20px;
  }
  .stat-item {
    text-align: center;
  }
  .stat-item .num {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-item .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── 创建面板 ─── */
  .create-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 24px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .form-group label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group select,
  .form-group input {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 140px;
  }
  .form-group select:focus,
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: #fff;
    box-shadow: 0 2px 12px var(--accent-glow);
  }
  .btn-primary:hover {
    box-shadow: 0 4px 20px var(--accent-glow);
    transform: translateY(-1px);
  }
  .btn-success {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid rgba(34,197,94,0.25);
  }
  .btn-success:hover { background: rgba(34,197,94,0.2); }
  .btn-danger {
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid rgba(239,68,68,0.25);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-warning {
    background: var(--warning-bg);
    color: var(--warning);
    border: 1px solid rgba(245,158,11,0.25);
  }
  .btn-warning:hover { background: rgba(245,158,11,0.2); }
  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
  }

  /* ─── 表格 ─── */
  .table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: rgba(99,102,241,0.08);
    padding: 14px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  td {
    padding: 14px 16px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,53,80,0.5);
    vertical-align: middle;
  }
  tr:hover td {
    background: var(--bg-card-hover);
  }
  tr:last-child td {
    border-bottom: none;
  }

  /* ─── 状态标签 ─── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .badge-active {
    background: var(--success-bg);
    color: var(--success);
  }
  .badge-active::before { background: var(--success); }
  .badge-inactive {
    background: var(--warning-bg);
    color: var(--warning);
  }
  .badge-inactive::before { background: var(--warning); }
  .badge-expired {
    background: var(--danger-bg);
    color: var(--danger);
  }
  .badge-expired::before { background: var(--danger); }
  .badge-online {
    background: var(--success-bg);
    color: var(--success);
  }
  .badge-online::before { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .badge-offline {
    background: rgba(90,100,120,0.15);
    color: var(--text-muted);
  }
  .badge-offline::before { background: var(--text-muted); }

  .mono {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--info);
    background: var(--info-bg);
    padding: 2px 8px;
    border-radius: 4px;
    user-select: all;
  }

  .time-cell {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .time-cell .remaining {
    font-weight: 600;
  }
  .time-cell .remaining.ok { color: var(--success); }
  .time-cell .remaining.warn { color: var(--warning); }
  .time-cell .remaining.expired { color: var(--danger); }

  .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .duration-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .duration-tag.day { background: var(--info-bg); color: var(--info); }
  .duration-tag.month { background: rgba(168,85,247,0.12); color: #a855f7; }
  .duration-tag.custom { background: var(--warning-bg); color: var(--warning); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .empty-state p { font-size: 14px; }

  /* ─── Toast ─── */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    animation: toastIn 0.3s ease-out;
    box-shadow: var(--shadow);
  }
  .toast.success { background: #166534; color: #bbf7d0; }
  .toast.error { background: #991b1b; color: #fecaca; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ─── 加载动画 ─── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── 自定义时长输入 ─── */
  #customGroup {
    display: none;
  }
  #customGroup.show {
    display: flex;
  }

  /* ─── 创建结果弹框 ─── */
  .modal-mask {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-mask.show { display: flex; }
  .modal-box {
    background: var(--bg-secondary, #fff);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: min(520px, 92vw);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    font-size: 16px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    color: var(--text-secondary, #888);
  }
  .result-text {
    margin: 0;
    padding: 16px 20px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .modal-foot {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  /* ─── 批量操作 ─── */
  .bulk-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(99,102,241,0.06);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ─── 响应式 ─── */
  @media (max-width: 768px) {
    .container { padding: 10px; }
    .header { flex-direction: column; gap: 10px; align-items: flex-start; padding: 16px; }
    .header h1 { font-size: 18px; }
    .stats { gap: 8px; flex-wrap: wrap; width: 100%; }
    .stat-item .num { font-size: 18px; }
    .stat-item .label { font-size: 10px; }
    .create-panel { flex-direction: column; align-items: stretch !important; padding: 14px !important; gap: 10px; }
    .create-panel .form-group { width: 100%; }
    .form-group select,
    .form-group input { min-width: 0 !important; width: 100% !important; }
    .create-panel .form-group[style*="flex-grow"] { align-items: stretch !important; }
    .create-panel .btn-primary,
    .create-panel .btn-danger { width: 100%; justify-content: center; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .modal-box { width: 95vw !important; }
    .modal-head { padding: 14px 16px; font-size: 15px; }
    .result-text { padding: 12px 14px; font-size: 13px; }
    .modal-foot { padding: 12px 14px; }
    .toast-container { top: 10px; right: 10px; left: 10px; }
    .toast { font-size: 12px; padding: 10px 14px; }

    .table-wrap { overflow: visible; background: none; border: none; border-radius: 0; }
    table, thead, tbody, tr, th, td { display: block; }
    thead { display: none; }
    tbody tr {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      padding: 14px;
    }
    tbody tr:hover td { background: none; }
    tbody td {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(42,53,80,0.3);
      white-space: normal;
    }
    tbody td:last-child { border-bottom: none; }
    tbody td::before {
      content: attr(data-label);
      font-weight: 600;
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      margin-right: 12px;
    }
    tbody td.time-cell { flex-direction: column; align-items: flex-start; gap: 2px; }
    tbody td.time-cell::before { margin-bottom: 2px; }
    tbody td.td-actions { padding-top: 10px; }
    tbody td.td-actions::before { display: none; }
    tbody td.td-actions .actions { width: 100%; justify-content: flex-start; }
    tbody td.empty-state { display: block; border-bottom: none; }
    tbody td.empty-state::before { display: none; }
  }
</style>
</head>
<body>
  <div class="container">
    <!-- 顶栏 -->
    <div class="header">
      <div>
        <h1>🔐 卡密授权管理</h1>
        <div class="subtitle">MQTT 客户端授权 · 实时管理</div>
      </div>
      <div class="stats">
        <div class="stat-item">
          <div class="num" id="statTotal">-</div>
          <div class="label">总数</div>
        </div>
        <div class="stat-item">
          <div class="num" id="statActive" style="color:var(--success)">-</div>
          <div class="label">激活</div>
        </div>
        <div class="stat-item">
          <div class="num" id="statOnline" style="color:var(--info)">-</div>
          <div class="label">在线</div>
        </div>
        <div class="stat-item">
          <div class="num" id="statExpired" style="color:var(--danger)">-</div>
          <div class="label">过期</div>
        </div>
        <div class="stat-item" style="display:flex;align-items:center">
          <button class="btn btn-sm" onclick="doLogout()">退出登录</button>
        </div>
      </div>
    </div>

    <!-- 项目选择栏 -->
    <div class="create-panel" id="projectBar" style="margin-bottom:16px;padding:16px 28px;align-items:center">
      <div class="form-group" style="flex-grow:1">
        <label>当前项目</label>
        <select id="projectSelect" onchange="switchProject()"></select>
      </div>
      <div class="form-group" style="align-items:flex-end">
        <button class="btn btn-primary btn-sm" onclick="createProjectPrompt()">新建项目</button>
      </div>
      <div class="form-group" style="align-items:flex-end">
        <button class="btn btn-sm" onclick="renameProjectPrompt()">重命名</button>
      </div>
      <div class="form-group" style="align-items:flex-end">
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentProject()">删除项目</button>
      </div>
    </div>

    <!-- 创建面板 -->
    <div class="create-panel">
      <div class="form-group">
        <label>卡密类型</label>
        <select id="durationType" onchange="toggleCustom()">
          <option value="day">天卡 (24小时)</option>
          <option value="month" selected>月卡 (30天)</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="form-group" id="customGroup">
        <label>自定义时长 (小时)</label>
        <input type="number" id="customHours" placeholder="如 72" min="1">
      </div>
      <div class="form-group">
        <label>备注</label>
        <input type="text" id="note" placeholder="可选备注" style="min-width:180px">
      </div>
      <div class="form-group">
        <label>自定义账号</label>
        <input type="text" id="customAccount" placeholder="留空则随机生成">
      </div>
      <div class="form-group">
        <label>自定义密码</label>
        <input type="text" id="customPassword" placeholder="留空则随机生成">
      </div>
      <div class="form-group">
        <label>生成数量</label>
        <input type="number" id="createCount" value="1" min="1" max="100" style="min-width:90px">
      </div>
      <div class="form-group">
        <label>金额 (元)</label>
        <input type="number" id="cardPrice" min="0" placeholder="必填" style="min-width:90px">
      </div>
      <div class="form-group" style="flex-grow:1;align-items:flex-end">
        <button class="btn btn-primary" onclick="createCard()" id="createBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          生成卡密
        </button>
      </div>
    </div>

    <!-- 工具栏: 搜索 / 类型筛选 / 一键清理 -->
    <div class="create-panel" style="margin-bottom:16px;padding:16px 28px">
      <div class="form-group" style="flex-grow:1">
        <label>搜索卡密</label>
        <input type="text" id="searchInput" placeholder="按账号 / 密码 / 备注搜索" oninput="renderCards()" style="min-width:220px">
      </div>
      <div class="form-group">
        <label>类型筛选</label>
        <select id="typeFilter" onchange="renderCards()">
          <option value="all" selected>全部类型</option>
          <option value="day">天卡</option>
          <option value="month">月卡</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="form-group" style="align-items:flex-end">
        <button class="btn btn-primary btn-sm" onclick="extendAllMonthly()">月卡续期</button>
      </div>
      <div class="form-group" style="align-items:flex-end">
        <button class="btn btn-success btn-sm" onclick="settleCards()">一键结算</button>
      </div>
      <div class="form-group" style="align-items:flex-end">
        <button class="btn btn-danger" onclick="cleanupExpired()" id="cleanupBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
          一键清理过期
        </button>
      </div>
    </div>

    <!-- 表格 -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>账号</th>
            <th>密码</th>
            <th>类型</th>
            <th>金额</th>
            <th>结算</th>
            <th>状态</th>
            <th>在线</th>
            <th>最后登录</th>
            <th>时间信息</th>
            <th>备注</th>
            <th style="text-align:right">操作</th>
          </tr>
        </thead>
        <tbody id="cardTable">
          <tr><td colspan="11" class="empty-state"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast-container" id="toastBox"></div>

  <!-- 登录浮层 -->
  <div class="modal-mask" id="loginModal">
    <div class="modal-box" style="width:min(380px,92vw)">
      <div class="modal-head"><span>🔐 后台登录</span></div>
      <div style="padding:20px;display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="loginUser" placeholder="管理员账号" autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPwd" placeholder="管理员密码" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary" onclick="doLogin()" id="loginBtn" style="justify-content:center">登录</button>
      </div>
    </div>
  </div>

  <!-- 创建结果弹框 -->
  <div class="modal-mask" id="resultModal" onclick="if(event.target===this)closeResultModal()">
    <div class="modal-box">
      <div class="modal-head">
        <span id="resultTitle">创建成功</span>
        <button class="modal-close" onclick="closeResultModal()">&times;</button>
      </div>
      <pre class="result-text" id="resultText"></pre>
      <div class="modal-foot">
        <button class="btn btn-primary" onclick="copyResult()" id="copyBtn">复制账号密码</button>
        <button class="btn" onclick="closeResultModal()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 通用对话框 -->
  <div class="modal-mask" id="dlgModal" onclick="if(event.target===this)_dlgClose(null)">
    <div class="modal-box" style="width:min(400px,92vw)">
      <div class="modal-head">
        <span id="dlgTitle"></span>
        <button class="modal-close" onclick="_dlgClose(null)">&times;</button>
      </div>
      <div style="padding:16px 20px;display:flex;flex-direction:column;gap:12px">
        <p id="dlgMsg" style="display:none;color:var(--text-secondary);font-size:14px;margin:0;line-height:1.6"></p>
        <div class="form-group" id="dlgInputWrap" style="display:none">
          <input type="text" id="dlgInput">
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-primary" id="dlgOk">确定</button>
        <button class="btn" onclick="_dlgClose(null)">取消</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/hx8k2a_core';
    let _currentProjectId = null;
    let _projects = [];

    // ─── Toast ───
    function toast(msg, type = 'success') {
      const box = document.getElementById('toastBox');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      box.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
    }

    // ─── 通用对话框 ───
    let _dlgResolve = null;
    function _dlgClose(val) {
      document.getElementById('dlgModal').className = 'modal-mask';
      if (_dlgResolve) { _dlgResolve(val); _dlgResolve = null; }
    }
    function showPrompt(title, placeholder, defaultValue) {
      return new Promise(resolve => {
        _dlgResolve = resolve;
        document.getElementById('dlgTitle').textContent = title;
        document.getElementById('dlgMsg').style.display = 'none';
        document.getElementById('dlgInputWrap').style.display = 'flex';
        const inp = document.getElementById('dlgInput');
        inp.placeholder = placeholder || '';
        inp.value = defaultValue || '';
        inp.onkeydown = e => { if (e.key === 'Enter') document.getElementById('dlgOk').click(); };
        document.getElementById('dlgOk').onclick = () => _dlgClose(inp.value);
        document.getElementById('dlgModal').className = 'modal-mask show';
        setTimeout(() => inp.focus(), 50);
      });
    }
    function showConfirm(title, msg, useHtml, okText) {
      return new Promise(resolve => {
        _dlgResolve = resolve;
        document.getElementById('dlgTitle').textContent = title;
        const m = document.getElementById('dlgMsg');
        m.style.display = 'block';
        if (useHtml) { m.innerHTML = msg || ''; } else { m.textContent = msg || ''; }
        document.getElementById('dlgInputWrap').style.display = 'none';
        const ok = document.getElementById('dlgOk');
        ok.textContent = okText || '确定';
        ok.onclick = () => _dlgClose(true);
        document.getElementById('dlgModal').className = 'modal-mask show';
      });
    }

    // ─── 切换自定义时长输入 ───
    function toggleCustom() {
      const sel = document.getElementById('durationType').value;
      document.getElementById('customGroup').className = sel === 'custom' ? 'form-group show' : 'form-group';
    }

    // ─── 项目管理 ───
    async function loadProjects() {
      try {
        const res = await fetch(`${API}/projects`);
        if (res.status === 401) { showLogin(true); return; }
        const data = await res.json();
        if (!data.success) return;
        _projects = data.data || [];
        const sel = document.getElementById('projectSelect');
        sel.innerHTML = _projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        if (_projects.length) {
          const saved = localStorage.getItem('hdfx_project_id');
          const found = _projects.find(p => String(p.id) === saved);
          _currentProjectId = found ? found.id : _projects[0].id;
          sel.value = _currentProjectId;
        } else {
          _currentProjectId = null;
        }
        loadCards();
      } catch (e) {
        toast('加载项目列表失败', 'error');
      }
    }

    function switchProject() {
      _currentProjectId = parseInt(document.getElementById('projectSelect').value);
      localStorage.setItem('hdfx_project_id', _currentProjectId);
      loadCards();
    }

    async function createProjectPrompt() {
      const name = await showPrompt('新建项目', '请输入项目名称');
      if (!name || !name.trim()) return;
      const priceStr = await showPrompt('默认金额', '月卡默认金额 (元)', '0');
      if (priceStr === null) return;
      const default_price = parseInt(priceStr) || 0;
      try {
        const res = await fetch(`${API}/projects`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name.trim(), default_price }),
        });
        const data = await res.json();
        if (data.success) {
          toast('项目创建成功');
          _currentProjectId = data.data.id;
          localStorage.setItem('hdfx_project_id', _currentProjectId);
          await loadProjects();
        } else {
          toast(data.error, 'error');
        }
      } catch (e) {
        toast('创建失败', 'error');
      }
    }

    async function renameProjectPrompt() {
      if (!_currentProjectId) return;
      const proj = _projects.find(p => p.id === _currentProjectId);
      const name = await showPrompt('重命名项目', '请输入新名称', proj ? proj.name : '');
      if (!name || !name.trim()) return;
      try {
        const res = await fetch(`${API}/projects/${_currentProjectId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name.trim() }),
        });
        const data = await res.json();
        if (data.success) {
          toast('重命名成功');
          await loadProjects();
        } else {
          toast(data.error, 'error');
        }
      } catch (e) {
        toast('重命名失败', 'error');
      }
    }

    async function deleteCurrentProject() {
      if (!_currentProjectId) return;
      const proj = _projects.find(p => p.id === _currentProjectId);
      if (!await showConfirm('删除项目', `确定删除项目「${proj ? proj.name : ''}」及其所有卡密？此操作不可恢复。`)) return;
      try {
        const res = await fetch(`${API}/projects/${_currentProjectId}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          toast(`已删除项目, 清理 ${data.deleted_cards} 个卡密`);
          localStorage.removeItem('hdfx_project_id');
          await loadProjects();
        } else {
          toast(data.error, 'error');
        }
      } catch (e) {
        toast('删除失败', 'error');
      }
    }

    // ─── 创建卡密 ───
    async function createCard() {
      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 生成中...';

      const priceVal = document.getElementById('cardPrice').value.trim();
      if (priceVal === '') {
        toast('请填写金额', 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 生成卡密`;
        return;
      }

      const body = {
        duration_type: document.getElementById('durationType').value,
        note: document.getElementById('note').value,
        project_id: _currentProjectId,
        price: parseInt(priceVal) || 0,
      };
      const customAccount = document.getElementById('customAccount').value.trim();
      const customPassword = document.getElementById('customPassword').value.trim();
      let count = parseInt(document.getElementById('createCount').value) || 1;
      count = Math.max(1, Math.min(count, 100));
      body.count = count;
      if (count === 1) {
        if (customAccount) body.account = customAccount;
        if (customPassword) body.password = customPassword;
      }
      if (body.duration_type === 'custom') {
        body.custom_hours = parseInt(document.getElementById('customHours').value);
        if (!body.custom_hours || body.custom_hours <= 0) {
          toast('请输入有效的自定义时长', 'error');
          btn.disabled = false;
          btn.innerHTML = '✚ 生成卡密';
          return;
        }
      }

      try {
        const res = await fetch(`${API}/cards`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.success) {
          const cards = Array.isArray(data.data) ? data.data : [data.data];
          showResultModal(cards);
          document.getElementById('note').value = '';
          document.getElementById('customAccount').value = '';
          document.getElementById('customPassword').value = '';
          document.getElementById('createCount').value = '1';
          document.getElementById('cardPrice').value = '';
          loadCards();
        } else {
          toast(data.error || '创建失败', 'error');
        }
      } catch (e) {
        toast('网络错误', 'error');
      }

      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 生成卡密`;
    }

    // ─── 创建结果弹框 ───
    let _resultText = '';
    function showResultModal(cards) {
      const dMap = { day: '天卡', month: '月卡' };
      _resultText = cards.map(c => {
        const dur = dMap[c.duration_type] || `${c.duration_hours}小时`;
        return `账号:${c.account} 密码:${c.password} 时长:${dur}`;
      }).join('\n');
      document.getElementById('resultTitle').textContent = `创建成功 (${cards.length} 个)`;
      document.getElementById('resultText').textContent = _resultText;
      document.getElementById('copyBtn').textContent = '复制账号密码';
      document.getElementById('resultModal').className = 'modal-mask show';
    }
    function closeResultModal() {
      document.getElementById('resultModal').className = 'modal-mask';
    }
    // ─── 通用复制到剪贴板 ───
    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        return true;
      } catch (e) {
        return false;
      }
    }

    async function copyRow(accEnc, pwdEnc, durType, durHours) {
      const dMap = { day: '天卡', month: '月卡' };
      const dur = dMap[durType] || `${durHours}小时`;
      const txt = `账号:${decodeURIComponent(accEnc)} 密码:${decodeURIComponent(pwdEnc)} 时长:${dur}`;
      const ok = await copyText(txt);
      toast(ok ? '已复制账号密码' : '复制失败', ok ? 'success' : 'error');
    }

    async function copyResult() {
      const btn = document.getElementById('copyBtn');
      if (await copyText(_resultText)) {
        btn.textContent = '已复制 ✓';
        toast('已复制到剪贴板');
        setTimeout(() => { btn.textContent = '复制账号密码'; }, 2000);
      } else {
        toast('复制失败, 请手动选择', 'error');
      }
    }

    // ─── 激活 / 停用 ───
    async function toggleActive(id, currentlyActive) {
      const action = currentlyActive ? 'deactivate' : 'activate';
      try {
        const res = await fetch(`${API}/cards/${id}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          toast(currentlyActive ? '已停用' : '已激活');
          loadCards();
        } else {
          toast(data.error, 'error');
        }
      } catch (e) {
        toast('操作失败', 'error');
      }
    }

    // ─── 删除 ───
    async function deleteCard(id) {
      if (!await showConfirm('删除卡密', '确定删除此卡密？')) return;
      try {
        const res = await fetch(`${API}/cards/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          toast('已删除');
          loadCards();
        }
      } catch (e) {
        toast('删除失败', 'error');
      }
    }

    // ─── 修改密码 ───
    async function editPassword(id, oldPwdEnc) {
      const oldPwd = decodeURIComponent(oldPwdEnc);
      const pwd = await showPrompt('修改密码', '请输入新密码', oldPwd);
      if (pwd === null) return;
      const newPwd = pwd.trim();
      if (!newPwd) { toast('密码不能为空', 'error'); return; }
      if (newPwd === oldPwd) return;
      try {
        const res = await fetch(`${API}/cards/${id}/password`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: newPwd }),
        });
        const data = await res.json();
        if (data.success) {
          toast('密码已修改');
          loadCards();
        } else {
          toast(data.error || '修改失败', 'error');
        }
      } catch (e) {
        toast('修改失败', 'error');
      }
    }

    // ─── 剩余时间格式化 ───
    function formatRemaining(expiresAt) {
      if (!expiresAt) return { text: '-', cls: '' };
      const diff = new Date(expiresAt) - new Date();
      if (diff <= 0) return { text: '已过期', cls: 'expired' };
      const h = Math.floor(diff / 3600000);
      const d = Math.floor(h / 24);
      const remH = h % 24;
      if (d > 3) return { text: `${d}天${remH}时`, cls: 'ok' };
      if (d > 0) return { text: `${d}天${remH}时`, cls: 'warn' };
      return { text: `${h}小时`, cls: 'warn' };
    }

    // ─── 时长类型标签 ───
    function durationLabel(type, hours) {
      const map = { day: '天卡', month: '月卡', custom: '自定义' };
      const label = map[type] || type;
      return `<span class="duration-tag ${type}">${label} · ${hours}h</span>`;
    }

    // ─── 获取状态 ───
    function getStatus(card) {
      if (card.is_disabled) return { badge: 'inactive', text: '已停用' };
      if (!card.is_active) return { badge: 'inactive', text: '待使用' };
      if (card.expires_at && new Date(card.expires_at) < new Date()) {
        return { badge: 'expired', text: '已过期' };
      }
      return { badge: 'active', text: '使用中' };
    }

    // ─── 加载列表 (拉取后缓存, 再走 renderCards 做搜索/筛选) ───
    let _allCards = [];
    async function loadCards() {
      if (!_currentProjectId) {
        _allCards = [];
        renderCards();
        return;
      }
      try {
        const res = await fetch(`${API}/cards?project_id=${_currentProjectId}`);
        if (res.status === 401) {
          if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
          showLogin(true);
          return;
        }
        const data = await res.json();
        if (!data.success) return;
        _allCards = data.data || [];
        renderCards();
      } catch (e) {
        console.error(e);
        toast('加载卡密列表失败', 'error');
      }
    }

    // ─── 渲染 (应用搜索关键字 + 类型筛选; 统计始终基于全部卡密) ───
    function renderCards() {
      const tbody = document.getElementById('cardTable');
      const cards = _allCards;

      // 统计 (全量)
      let total = cards.length;
      let active = 0, expired = 0, online = 0;
      cards.forEach(c => {
        const s = getStatus(c);
        if (s.badge === 'active') active++;
        if (s.badge === 'expired') expired++;
        if (c.is_online) online++;
      });
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statOnline').textContent = online;
      document.getElementById('statExpired').textContent = expired;

      // 搜索 + 类型筛选
      const kw = (document.getElementById('searchInput').value || '').trim().toLowerCase();
      const typeF = document.getElementById('typeFilter').value;
      const filtered = cards.filter(c => {
        if (typeF !== 'all' && c.duration_type !== typeF) return false;
        if (!kw) return true;
        return [c.account, c.password, c.note].some(v => (v || '').toLowerCase().includes(kw));
      });

      if (!filtered.length) {
        const emptyMsg = (kw || typeF !== 'all')
          ? '没有匹配的卡密，试试调整搜索或筛选条件'
          : '暂无卡密，点击上方「生成卡密」创建';
        tbody.innerHTML = `
          <tr><td colspan="11" class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
            <p>${emptyMsg}</p>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(c => {
        const status = getStatus(c);
        const remaining = formatRemaining(c.expires_at);
        const online = !!c.is_online;
        const lastLogin = c.last_login_at ? c.last_login_at.replace('T', ' ') : '<span style="color:var(--text-muted)">从未登录</span>';

        return `<tr>
          <td data-label="账号"><span class="mono">${c.account}</span></td>
          <td data-label="密码"><span class="mono">${c.password}</span></td>
          <td data-label="类型">${durationLabel(c.duration_type, c.duration_hours)}</td>
          <td data-label="金额">${c.price || 0} 元</td>
          <td data-label="结算"><span class="badge badge-${c.is_settled ? 'active' : 'inactive'}">${c.is_settled ? '已结算' : '未结算'}</span></td>
          <td data-label="状态"><span class="badge badge-${status.badge}">${status.text}</span></td>
          <td data-label="在线"><span class="badge badge-${online ? 'online' : 'offline'}">${online ? '在线' : '离线'}</span></td>
          <td class="time-cell" data-label="最后登录">${lastLogin}</td>
          <td class="time-cell" data-label="时间信息">
            ${c.activated_at ? '首次登录: ' + c.activated_at.replace('T', ' ') + '<br>' : '<span style="color:var(--text-muted)">首次登录时自动激活</span><br>'}
            ${c.expires_at ? '到期: ' + c.expires_at.replace('T', ' ') + '<br>' : ''}
            ${c.expires_at ? '<span class="remaining ' + remaining.cls + '">剩余: ' + remaining.text + '</span>' : ''}
          </td>
          <td data-label="备注" style="color:var(--text-muted)">${c.note || '-'}</td>
          <td class="td-actions">
            <div class="actions" style="justify-content:flex-end">
              <button class="btn btn-sm btn-success" onclick="copyRow('${encodeURIComponent(c.account)}', '${encodeURIComponent(c.password)}', '${c.duration_type}', ${c.duration_hours})">复制</button>
              <button class="btn btn-sm" onclick="extendCard(${c.id})">续期</button>
              <button class="btn btn-sm" onclick="editPassword(${c.id}, '${encodeURIComponent(c.password)}')">改密</button>
              ${c.is_disabled
                ? '<button class="btn btn-sm btn-success" onclick="toggleActive(' + c.id + ', 0)">启用</button>'
                : '<button class="btn btn-sm btn-warning" onclick="toggleActive(' + c.id + ', 1)">停用</button>'}
              <button class="btn btn-sm btn-danger" onclick="deleteCard(${c.id})">删除</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    // ─── 一键清理过期卡密 ───
    async function cleanupExpired() {
      if (!await showConfirm('清理过期', '确定清理所有「已过期」卡密？此操作不可恢复。')) return;
      const btn = document.getElementById('cleanupBtn');
      const orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 清理中...';
      try {
        const res = await fetch(`${API}/cards/cleanup-expired`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: _currentProjectId }),
        });
        const data = await res.json();
        if (data.success) {
          toast(data.deleted > 0 ? `已清理 ${data.deleted} 个过期卡密` : '没有可清理的过期卡密');
          loadCards();
        } else {
          toast(data.error || '清理失败', 'error');
        }
      } catch (e) {
        toast('清理失败', 'error');
      }
      btn.disabled = false;
      btn.innerHTML = orig;
    }

    // ─── 续期 ───
    async function extendCard(id) {
      const input = await showPrompt('续期', '增加天数 (支持小数, 如 0.5 = 12小时)');
      if (!input) return;
      const days = parseFloat(input);
      if (!days || days <= 0) { toast('请输入有效的天数', 'error'); return; }
      const hours = Math.round(days * 24);
      try {
        const res = await fetch(`${API}/cards/${id}/extend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hours }),
        });
        const data = await res.json();
        if (data.success) {
          toast(`已增加 ${days} 天`);
          loadCards();
        } else {
          toast(data.error, 'error');
        }
      } catch (e) {
        toast('操作失败', 'error');
      }
    }

    async function extendAllMonthly() {
      const input = await showPrompt('月卡续期', '增加天数');
      if (!input) return;
      const days = parseFloat(input);
      if (!days || days <= 0) { toast('请输入有效的天数', 'error'); return; }
      if (!await showConfirm('月卡续期', `确定给当前项目所有月卡增加 ${days} 天？`)) return;
      const hours = Math.round(days * 24);
      try {
        const res = await fetch(`${API}/cards/extend-monthly`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hours, project_id: _currentProjectId }),
        });
        const data = await res.json();
        if (data.success) {
          toast(`已为 ${data.count} 张月卡增加 ${days} 天`);
          loadCards();
        } else {
          toast(data.error, 'error');
        }
      } catch (e) {
        toast('操作失败', 'error');
      }
    }

    // ─── 一键结算 ───
    async function settleCards() {
      if (!_currentProjectId) return;
      const unsettled = _allCards.filter(c => !c.is_settled);
      if (!unsettled.length) { toast('没有未结算的卡密'); return; }
      const total = unsettled.reduce((s, c) => s + (c.price || 0), 0);
      const typeNames = { day: '天卡', month: '月卡', custom: '自定义' };
      const priceMap = {};
      unsettled.forEach(c => {
        const key = `${c.price || 0}_${c.duration_type}`;
        priceMap[key] = (priceMap[key] || 0) + 1;
      });
      const breakdown = Object.keys(priceMap).sort((a, b) => parseInt(b) - parseInt(a))
        .map(k => {
          const [p, t] = k.split('_');
          return `<div style="display:flex;justify-content:space-between;padding:4px 0"><span>${p} 元 · ${typeNames[t] || t}</span><span>${priceMap[k]} 张</span></div>`;
        })
        .join('');
      const html = `
        <div style="font-size:14px;line-height:1.8">
          <div style="display:flex;justify-content:space-between;font-weight:600;margin-bottom:8px"><span>未结算卡密</span><span>${unsettled.length} 张</span></div>
          <div style="border-top:1px solid var(--border);padding-top:8px;margin-bottom:8px">${breakdown}</div>
          <div style="border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:16px"><span>合计</span><span style="color:var(--success)">${total} 元</span></div>
        </div>`;
      if (!await showConfirm('一键结算', html, true, '结算')) return;
      try {
        const res = await fetch(`${API}/cards/settle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: _currentProjectId }),
        });
        const data = await res.json();
        if (data.success) {
          toast(`已结算 ${data.data.count} 张, 共 ${data.data.total_amount} 元`);
          loadCards();
        } else {
          toast(data.error, 'error');
        }
      } catch (e) {
        toast('结算失败', 'error');
      }
    }

    // ─── 登录 / 登出 / 会话 ───
    let _refreshTimer = null;

    function showLogin(show) {
      document.getElementById('loginModal').className = show ? 'modal-mask show' : 'modal-mask';
    }

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPwd').value;
      if (!username || !password) { toast('请输入账号和密码', 'error'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 登录中...';
      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          showLogin(false);
          document.getElementById('loginPwd').value = '';
          toast('登录成功');
          startApp();
        } else {
          toast(data.error || '登录失败', 'error');
        }
      } catch (e) {
        toast('网络错误', 'error');
      }
      btn.disabled = false;
      btn.innerHTML = '登录';
    }

    async function doLogout() {
      try { await fetch(`${API}/logout`, { method: 'POST' }); } catch (e) {}
      if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
      showLogin(true);
    }

    function startApp() {
      loadProjects();
      if (!_refreshTimer) _refreshTimer = setInterval(loadCards, 30000);
    }

    // ─── 启动: 先探测会话 ───
    (async function init() {
      try {
        const res = await fetch(`${API}/session`);
        const data = await res.json();
        if (data.authed) startApp();
        else showLogin(true);
      } catch (e) {
        showLogin(true);
      }
    })();
  </script>
</body>
</html>
